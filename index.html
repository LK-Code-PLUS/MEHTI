<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeHDī · gaming profile</title>
  <!-- Google Fonts + Font Awesome for icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0d10;
      background-image: 
        radial-gradient(circle at 15% 30%, rgba(0, 255, 255, 0.02) 0%, transparent 30%),
        radial-gradient(circle at 85% 70%, rgba(255, 0, 200, 0.02) 0%, transparent 35%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 6px);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Rajdhani', sans-serif;
      padding: 1.5rem;
    }

    /* main card – ancient‑gaming relic style */
    .gaming-card {
      max-width: 1100px;
      width: 100%;
      background: #12161c;
      background: linear-gradient(145deg, #101418 0%, #1a2029 100%);
      padding: 2.5rem 2.8rem;
      border-radius: 40px 12px 40px 12px;
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.8),
        inset 0 0 0 2px rgba(0, 255, 255, 0.15),
        inset 0 0 20px rgba(0, 255, 255, 0.05),
        0 0 0 6px #1f2833,
        0 0 0 10px rgba(0, 255, 255, 0.08);
      border: 1px solid rgba(0, 255, 255, 0.2);
      position: relative;
      transition: all 0.2s ease;
    }

    /* decorative corner brackets – ancient & detailed */
    .gaming-card::before {
      content: '';
      position: absolute;
      top: -8px;
      left: -8px;
      width: 70px;
      height: 70px;
      border-top: 4px solid #00ffff;
      border-left: 4px solid #00ffff;
      opacity: 0.5;
      filter: drop-shadow(0 0 8px cyan);
      border-radius: 4px 0 0 0;
    }

    .gaming-card::after {
      content: '';
      position: absolute;
      bottom: -8px;
      right: -8px;
      width: 70px;
      height: 70px;
      border-bottom: 4px solid #ff00c8;
      border-right: 4px solid #ff00c8;
      opacity: 0.5;
      filter: drop-shadow(0 0 8px magenta);
      border-radius: 0 0 4px 0;
    }

    /* inner border details */
    .inner-border {
      position: absolute;
      inset: 12px;
      border: 1px dashed rgba(0, 255, 255, 0.15);
      border-radius: 30px 6px 30px 6px;
      pointer-events: none;
    }

    /* header section */
    .profile-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid rgba(0, 255, 255, 0.2);
      padding-bottom: 1.8rem;
      margin-bottom: 2.2rem;
      position: relative;
    }

    .profile-header::after {
      content: '// GAMER·TAG';
      position: absolute;
      right: 0;
      bottom: -12px;
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 4px;
      color: rgba(0, 255, 255, 0.3);
      background: #12161c;
      padding: 0 12px;
    }

    .site-title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 2.6rem;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #b3f0ff, #7a9cff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(0, 180, 255, 0.3);
      position: relative;
    }

    .site-title i {
      font-size: 2.2rem;
      margin-right: 10px;
      color: #00ffff;
      filter: drop-shadow(0 0 8px cyan);
    }

    .badge-prime {
      background: rgba(255, 0, 100, 0.15);
      border: 1px solid #ff006a;
      color: #ff4d8f;
      padding: 0.3rem 1.6rem;
      border-radius: 40px;
      font-weight: 700;
      letter-spacing: 2px;
      font-size: 1rem;
      backdrop-filter: blur(2px);
      box-shadow: 0 0 15px rgba(255, 0, 100, 0.2);
      font-family: 'Orbitron', monospace;
    }

    .badge-prime i {
      margin-right: 8px;
    }

    /* grid info – gaming stats */
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.8rem;
      margin: 2.5rem 0 2.8rem 0;
    }

    .stat-block {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
      padding: 1.2rem 1rem;
      border-radius: 20px 4px 20px 4px;
      border-left: 4px solid #00ffff;
      border-right: 1px solid rgba(255, 0, 200, 0.2);
      box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.02), 0 6px 12px rgba(0,0,0,0.5);
      transition: 0.25s ease;
    }

    .stat-block:hover {
      border-left-color: #ff00c8;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.1), inset 0 0 15px rgba(255, 0, 200, 0.05);
      transform: translateY(-3px);
    }

    .stat-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #8899bb;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-label i {
      color: #00ffff;
      font-size: 0.8rem;
    }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 2.1rem;
      color: #f0faff;
      margin-top: 6px;
      text-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
      letter-spacing: 1px;
    }

    .stat-value small {
      font-size: 1rem;
      font-weight: 300;
      color: #7a8aa8;
      margin-left: 5px;
      font-family: 'Rajdhani', sans-serif;
    }

    .stat-desc {
      font-size: 0.9rem;
      color: #b0c4de;
      margin-top: 4px;
      font-weight: 300;
      letter-spacing: 0.5px;
      border-top: 1px dashed rgba(255,255,255,0.05);
      padding-top: 6px;
    }

    /* description box – ancient style */
    .desc-box {
      background: #0d1117;
      background: linear-gradient(135deg, #0b0f14, #141b24);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 30px 4px 30px 4px;
      padding: 1.8rem 2rem;
      margin: 1.8rem 0 2.2rem 0;
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(0, 255, 255, 0.08);
      position: relative;
    }

    .desc-box::before {
      content: '⚔️';
      position: absolute;
      top: -14px;
      left: 30px;
      font-size: 1.8rem;
      filter: drop-shadow(0 0 6px gold);
    }

    .desc-box::after {
      content: '⏣';
      position: absolute;
      bottom: -12px;
      right: 30px;
      font-size: 1.6rem;
      color: #00ffff;
      opacity: 0.3;
    }

    .desc-title {
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: #88bbee;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .desc-title i {
      color: #ff00a0;
    }

    .desc-text {
      font-size: 1.3rem;
      font-weight: 600;
      color: #d4e6ff;
      letter-spacing: 0.5px;
      text-shadow: 0 0 6px rgba(0, 150, 255, 0.1);
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px 20px;
    }

    .desc-text .highlight {
      background: rgba(0, 255, 255, 0.08);
      padding: 0.1rem 1.2rem;
      border-radius: 30px;
      border: 1px solid rgba(0, 255, 255, 0.15);
      font-family: 'Orbitron', monospace;
      font-weight: 400;
      font-size: 1rem;
      color: #a0d0ff;
    }

    .desc-text .emoji-big {
      font-size: 1.8rem;
      filter: drop-shadow(0 0 8px gold);
    }

    /* footer / extra details */
    .gaming-footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-top: 2.8rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(0, 255, 255, 0.1);
      font-size: 0.8rem;
      color: #6a7b99;
      letter-spacing: 2px;
      font-family: 'Orbitron', monospace;
    }

    .gaming-footer i {
      color: #00ffff;
      margin: 0 5px;
    }

    .social-links i {
      font-size: 1.2rem;
      margin-left: 14px;
      color: #667799;
      transition: 0.2s;
    }

    .social-links i:hover {
      color: #00ffff;
      text-shadow: 0 0 14px cyan;
    }

    /* small details */
    .ancient-corner {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.08);
      letter-spacing: 6px;
    }

    /* responsive */
    @media (max-width: 680px) {
      .gaming-card {
        padding: 1.8rem 1.2rem;
      }
      .site-title {
        font-size: 2rem;
        letter-spacing: 3px;
      }
      .stat-value {
        font-size: 1.6rem;
      }
      .desc-text {
        font-size: 1.1rem;
      }
    }

    /* extra glitch effect on title */
    .glitch-extra {
      animation: flicker 3s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      5% { opacity: 0.7; }
      10% { opacity: 1; }
      15% { opacity: 0.5; }
      20% { opacity: 1; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="gaming-card">
    <!-- inner decorative line -->
    <div class="inner-border"></div>

    <!-- header -->
    <div class="profile-header">
      <div class="site-title">
        <i class="fas fa-gamepad"></i> MeHDī
      </div>
      <div class="badge-prime">
        <i class="fas fa-crown"></i> PRIME: NO
      </div>
    </div>

    <!-- main gaming stats -->
    <div class="profile-grid">
      <!-- total playtime -->
      <div class="stat-block">
        <div class="stat-label"><i class="fas fa-clock"></i> PLAY TIME</div>
        <div class="stat-value">650 <small>hrs</small></div>
        <div class="stat-desc"><i class="fas fa-sync-alt fa-fw"></i> combined accounts</div>
      </div>
      <!-- name -->
      <div class="stat-block">
        <div class="stat-label"><i class="fas fa-user-astronaut"></i> GAMER</div>
        <div class="stat-value">مهدی</div>
        <div class="stat-desc"><i class="fas fa-id-card"></i> 18 سن · iran</div>
      </div>
      <!-- cs / pc player -->
      <div class="stat-block">
        <div class="stat-label"><i class="fas fa-desktop"></i> PLATFORM</div>
        <div class="stat-value">PC <small>player</small></div>
        <div class="stat-desc"><i class="fas fa-microchip"></i> قوی </div>
      </div>
      <!-- prime status -->
      <div class="stat-block">
        <div class="stat-label"><i class="fas fa-shield-alt"></i> PRIME</div>
        <div class="stat-value" style="color: #ff5577;">NO</div>
        <div class="stat-desc"><i class="fas fa-times-circle" style="color:#ff4466;"></i> standard</div>
      </div>
    </div>

    <!-- description box: ancient gaming vibe -->
    <div class="desc-box">
      <div class="desc-title">
        <i class="fas fa-scroll"></i> · TITLE · <i class="fas fa-skull"></i>
      </div>
      <div class="desc-text">
        <span class="emoji-big">⚡</span> 
        <span>مادر ولو و چیترارو</span>
        <span class="highlight"><i class="fas fa-cog"></i> </span>
        <span style="font-weight:300; font-size:0.9rem; color:#7a9bb5;">
          <i class="fas fa-shield-halved"></i> 0 ban
        </span>
        <span style="font-weight:300; font-size:1rem; margin-left:auto; color:#3a5f7a;">
          <i class="fas fa-dragon"></i> legacy
        </span>
      </div>
    </div>

    <!-- extra details: gaming footer -->
    <div class="gaming-footer">
      <div>
        <i class="fas fa-crown"></i>  MeHDī · <i class="fas fa-gamepad"></i>  PC player 
        <span style="margin:0 8px; color:#2a3a4a;">|</span>
        <i class="fas fa-clock"></i> 650h 
        <span style="margin:0 8px; color:#2a3a4a;">|</span>
        <i class="fas fa-user"></i> 18
      </div>
      <div class="social-links">
        <i class="fab fa-steam"></i>
        <i class="fab fa-discord"></i>
        <i class="fab fa-twitch"></i>
        <i class="fas fa-crown" style="color:gold; opacity:0.3;"></i>
      </div>
    </div>

    <!-- ancient detail line -->
    <div style="margin-top: 1.2rem; text-align: right; font-size:0.6rem; letter-spacing: 8px; color: rgba(0,255,255,0.1);">
      <span>◈ ◇ ◆ ◇ ◈</span>
    </div>
  </div>
</body>
</html>
